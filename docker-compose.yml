services:
  postgres:
    image: postgres:15
    container_name: jobradar-postgres
    environment:
      POSTGRES_DB: jobradar
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive:
    image: apache/hive:3.1.3
    container_name: jobradar-hive
    environment:
      SERVICE_NAME: hiveserver2
    ports:
      - "10000:10000"
      - "10002:10002"

volumes:
  pgdata:
