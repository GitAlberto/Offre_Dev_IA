services:
  postgres:
    image: postgres:15
    container_name: jobradar-postgres
    environment:
      POSTGRES_DB: jobradar
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - jobradar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore-db:
    image: postgres:15
    container_name: jobradar-hive-metastore-db
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_pgdata:/var/lib/postgresql/data
    networks:
      - jobradar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: jobradar-hive-metastore
    depends_on:
      hive-metastore-db:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dmetastore.try.direct.sql.ddl=false
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      - ./docker/hive/postgresql-42.5.1.jar:/opt/hive/lib/postgres.jar:ro
    networks:
      - jobradar

  hive:
    image: apache/hive:4.0.1
    container_name: jobradar-hive
    depends_on:
      hive-metastore:
        condition: service_started
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
      IS_RESUME: "true"
    ports:
      - "10010:10000"
      - "10012:10002"
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      - ./data/source_hive:/opt/hive/ext-data:ro
    networks:
      - jobradar

  hue-db:
    image: postgres:15
    container_name: jobradar-hue-db
    environment:
      POSTGRES_DB: hue
      POSTGRES_USER: hue
      POSTGRES_PASSWORD: hue
    volumes:
      - hue_pgdata:/var/lib/postgresql/data
    networks:
      - jobradar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hue -d hue"]
      interval: 10s
      timeout: 5s
      retries: 5

  hue:
    image: gethue/hue:latest
    container_name: jobradar-hue
    user: "0"
    depends_on:
      hive:
        condition: service_started
      hue-db:
        condition: service_healthy
    ports:
      - "8888:8888"
    volumes:
      - ./docker/hue/hue.ini:/usr/share/hue/desktop/conf/hue.ini:ro
    networks:
      - jobradar

volumes:
  pgdata:
  hive_metastore_pgdata:
  hive_warehouse:
  hue_pgdata:

networks:
  jobradar:
    name: jobradar-net
